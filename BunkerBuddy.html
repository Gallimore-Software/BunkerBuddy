<style>

  .btn-ghost { background: transparent; color: var(--text-dim); border: 1px solid var(--border); flex: 0; padding: 13px 14px; font-size: 16px; letter-spacing: 0; }
  .btn-ghost:hover:not(:disabled) { border-color: #5a6e52; color: var(--text); }
  .btn-new-match { background: transparent; color: var(--text-dim); border: 1px solid var(--border); font-family: var(--font-b); font-size: 13px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; padding: 10px 18px; border-radius: 3px; cursor: pointer; transition: all 0.15s; white-space: nowrap; }

  .match-block-header { background: var(--surface2); padding: 10px 14px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; border-bottom: 1px solid var(--border); }

  .match-block-vs .our { color: var(--green); } .match-block-vs .sep { color: var(--text-dim); margin: 0 6px; font-size: 14px; } .match-block-vs .enemy { color: var(--red); }
  .match-block-score { font-family: var(--font-d); font-size: 22px; letter-spacing: 1px; white-space: nowrap; }
  .match-block-score .sw { color: var(--green); } .match-block-score .sd { color: var(--text-dim); } .match-block-score .sl { color: var(--red); }
  .match-block-result { font-family: var(--font-m); font-size: 10px; letter-spacing: 1.5px; padding: 3px 8px; border-radius: 2px; }

  .match-block-result.lost { background: var(--red-dim); color: var(--red); border: 1px solid var(--red); }
  .match-block-result.tied { background: var(--amber-dim); color: var(--amber); border: 1px solid var(--amber); }
  .match-block-result.live { background: var(--blue-dim); color: var(--blue); border: 1px solid var(--blue); animation: pulse 1.4s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.5;} }
  .point-row { padding: 8px 14px; border-bottom: 1px solid var(--border2); display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .point-row:last-child { border-bottom: none; }
  .pr-num { font-family: var(--font-m); font-size: 10px; color: var(--text-dim); min-width: 38px; }
  .pr-result { font-family: var(--font-d); font-size: 14px; letter-spacing: 2px; min-width: 44px; }
  .pr-result.win { color: var(--green); } .pr-result.loss { color: var(--red); }
  .pr-names { font-family: var(--font-b); font-size: 13px; font-weight: 600; color: var(--text-dim); flex: 1; min-width: 0; }
  .pr-names span { color: var(--text); }
  .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
  @media (min-width: 500px) { .stats-grid { grid-template-columns: repeat(3, 1fr); } }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 10px 12px; }
  .stat-card-name { font-family: var(--font-b); font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.3px; color: var(--text); margin-bottom: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .stat-bars { display: flex; gap: 4px; }
  .mini-bar-wrap { flex: 1; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .mini-bar-fill { height: 100%; border-radius: 2px; transition: width 0.4s ease; }
  .mini-bar-fill.win { background: var(--green); } .mini-bar-fill.loss { background: var(--red); }
  .stat-nums { font-family: var(--font-m); font-size: 11px; color: var(--text-dim); display: flex; gap: 8px; margin-top: 5px; }
  .stat-nums .w { color: var(--green); } .stat-nums .l { color: var(--red); }
  .stat-pct { font-family: var(--font-m); font-size: 11px; color: var(--amber); margin-left: auto; }
  .empty { padding: 30px; text-align: center; font-family: var(--font-m); font-size: 11px; color: var(--text-dim); letter-spacing: 2px; text-transform: uppercase; }
  .flash-overlay { pointer-events: none; position: fixed; inset: 0; z-index: 9997; opacity: 0; transition: opacity 0.05s; }
  .flash-overlay.active { opacity: 0.07; transition: opacity 0s; }
  .modal-backdrop { position: fixed; inset: 0; z-index: 1000; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; padding: 20px; animation: fadeIn 0.15s ease; }
  @keyframes fadeIn { from{opacity:0;} to{opacity:1;} }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; width: 100%; max-width: 420px; overflow: hidden; animation: slideUp 0.18s ease; }
  @keyframes slideUp { from{opacity:0;transform:translateY(10px);} to{opacity:1;transform:none;} }
  .modal-header { padding: 14px 18px; background: var(--surface2); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }

  .cancel-btn { background: none; border: 1px solid var(--border); color: var(--text-dim); font-size: 14px; padding: 6px 10px; border-radius: 3px; cursor: pointer; flex-shrink: 0; }
  .add-input { flex: 1; background: var(--surface2); border: 1px solid var(--border); color: var(--text); font-family: var(--font-b); font-size: 14px; font-weight: 700; text-transform: uppercase; padding: 9px 12px; border-radius: 3px; outline: none; transition: border-color 0.12s; min-width: 0; }

  .modal-submit:disabled { opacity: 0.3; cursor: not-allowed; }

<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useEffect, useCallback } = React;
const MAX_ROSTER = 12, SQUAD_SIZE = 5;
const STORAGE_KEY = "bunkerbuddy-v1";
const DEFAULT = {
  ourTeam: "Our Team",
  roster: [{id:1,name:"Viper"},{id:2,name:"Ghost"},{id:3,name:"Reaper"}],
  matches: [], nextPlayerId: 4, nextMatchId: 1
};

function loadState() {
try { const s = localStorage.getItem(STORAGE_KEY); return s ? JSON.parse(s) : null; } catch { return null; }
}
function saveState(s) {
try { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); return true; } catch { return false; }
}
function matchResult(m) {
const w=m.points.filter(p=>p.result===“win”).length, l=m.points.filter(p=>p.result===“loss”).length;
if(!m.ended) return “live”; if(w>l) return “won”; if(l>w) return “lost”; return “tied”;
}
function matchResultLabel(m) { return {live:“LIVE”,won:“WIN”,lost:“LOSS”,tied:“TIE”}[matchResult(m)]; }

function App() {
const saved = loadState() || DEFAULT;
const [ourTeam, setOurTeam] = useState(saved.ourTeam);
const [editingTeam, setEditingTeam] = useState(false);
const [teamDraft, setTeamDraft] = useState(””);
const [roster, setRoster] = useState(saved.roster);
const [matches, setMatches] = useState(saved.matches);
const [nextPlayerId, setNextPlayerId] = useState(saved.nextPlayerId);
const [nextMatchId, setNextMatchId] = useState(saved.nextMatchId);
const [selected, setSelected] = useState([]);
const [flash, setFlash] = useState(null);
const [saveStatus, setSaveStatus] = useState(“hidden”);
const [showRosterModal, setShowRosterModal] = useState(false);
const [showNewMatchModal, setShowNewMatchModal] = useState(false);
const [newMatchOpponent, setNewMatchOpponent] = useState(””);
const [editingId, setEditingId] = useState(null);
const [editName, setEditName] = useState(””);
const [newPlayerName, setNewPlayerName] = useState(””);
const editRef = useRef(null), addRef = useRef(null), teamInputRef = useRef(null), opponentRef = useRef(null), saveTimer = useRef(null);
const isFirst = useRef(true);

useEffect(() => { if(editingId!==null&&editRef.current){editRef.current.focus();editRef.current.select();} }, [editingId]);
useEffect(() => { if(editingTeam&&teamInputRef.current){teamInputRef.current.focus();teamInputRef.current.select();} }, [editingTeam]);
useEffect(() => { if(showNewMatchModal) setTimeout(()=>opponentRef.current?.focus(),50); }, [showNewMatchModal]);

useEffect(() => {
if(isFirst.current){isFirst.current=false;return;}
setSaveStatus(“saving”);
clearTimeout(saveTimer.current);
saveTimer.current = setTimeout(() => {
saveState({ourTeam,roster,matches,nextPlayerId,nextMatchId});
setSaveStatus(“saved”);
saveTimer.current = setTimeout(()=>setSaveStatus(“hidden”),2000);
}, 600);
}, [ourTeam,roster,matches,nextPlayerId,nextMatchId]);

const activeMatch = matches.length>0&&!matches[matches.length-1].ended ? matches[matches.length-1] : null;
const allPoints = matches.flatMap(m=>m.points);
const totalWins = allPoints.filter(p=>p.result===“win”).length;
const totalLosses = allPoints.filter(p=>p.result===“loss”).length;
const ready = selected.length===SQUAD_SIZE;
const activeMatchWins = activeMatch ? activeMatch.points.filter(p=>p.result===“win”).length : 0;
const activeMatchLosses = activeMatch ? activeMatch.points.filter(p=>p.result===“loss”).length : 0;

const commitTeamEdit = () => { const t=teamDraft.trim(); if(t) setOurTeam(t); setEditingTeam(false); };
const startNewMatch = () => {
const t=newMatchOpponent.trim(); if(!t) return;
setMatches(prev=>[…prev,{id:nextMatchId,opponent:t,points:[],ended:false}]);
setNextMatchId(n=>n+1); setNewMatchOpponent(””); setShowNewMatchModal(false); setSelected([]);
};
const endMatch = () => { setMatches(prev=>prev.map((m,i)=>i===prev.length-1?{…m,ended:true}:m)); setSelected([]); };
const togglePlayer = id => setSelected(prev=>prev.includes(id)?prev.filter(x=>x!==id):prev.length<SQUAD_SIZE?[…prev,id]:prev);
const recordPoint = result => {
if(!activeMatch||!ready) return;
const squad=selected.map(id=>roster.find(p=>p.id===id));
const pt={point:activeMatch.points.length+1,result,squad};
setMatches(prev=>prev.map((m,i)=>i===prev.length-1?{…m,points:[…m.points,pt]}:m));
setFlash(result); setTimeout(()=>setFlash(null),300); setSelected([]);
};
const commitEdit = () => { const t=editName.trim(); if(t&&editingId!==null) setRoster(prev=>prev.map(p=>p.id===editingId?{…p,name:t}:p)); setEditingId(null); };
const addPlayer = () => {
const t=newPlayerName.trim(); if(!t||roster.length>=MAX_ROSTER) return;
setRoster(prev=>[…prev,{id:nextPlayerId,name:t}]); setNextPlayerId(n=>n+1); setNewPlayerName(””); addRef.current?.focus();
};
const removePlayer = id => { setRoster(prev=>prev.filter(p=>p.id!==id)); setSelected(prev=>prev.filter(x=>x!==id)); if(editingId===id) setEditingId(null); };
const slots = Array.from({length:SQUAD_SIZE},(_,i)=>{const id=selected[i];return id?roster.find(p=>p.id===id):null;});
const playerStats = roster.map(player=>{
const played=allPoints.filter(p=>p.squad.some(s=>s.id===player.id));
const w=played.filter(p=>p.result===“win”).length, l=played.filter(p=>p.result===“loss”).length, total=w+l;
return {…player,w,l,total,pct:total>0?Math.round((w/total)*100):null};
}).filter(p=>p.total>0).sort((a,b)=>b.total-a.total);

return (
<>
<div className={`flash-overlay${flash?" active":""}`} style={{background:flash===“win”?”#4ade6a”:”#f25c54”}}/>
<div className="scanline"/>
<div className={`save-indicator ${saveStatus}`}>{saveStatus===“saving”?“Saving…”:“Saved ✓”}</div>
<div className="app">
<header className="header">
<div className="header-left">
<div className="app-logo">Bunker<span>Buddy</span></div>
<div className="team-name-row">
<span className="team-name-label">Team //</span>
{editingTeam
? <input ref={teamInputRef} className=“team-name-input” value={teamDraft} onChange={e=>setTeamDraft(e.target.value)} onBlur={commitTeamEdit} onKeyDown={e=>{if(e.key===“Enter”)commitTeamEdit();if(e.key===“Escape”)setEditingTeam(false);}} maxLength={18}/>
: <span className=“team-name-display” onClick={()=>{setTeamDraft(ourTeam);setEditingTeam(true);}}>{ourTeam}</span>}
</div>
</div>
<div className="header-stats">
<div className="stat-chip wins"><span className="lbl">Wins</span><span className="val">{totalWins}</span></div>
<div className="stat-chip losses"><span className="lbl">Losses</span><span className="val">{totalLosses}</span></div>
<div className="stat-chip pts"><span className="lbl">Points</span><span className="val">{allPoints.length}</span></div>
</div>
</header>

```
    {activeMatch ? (
      <div className="match-banner">
        <div className="match-banner-inner">
          <span className="match-num">MATCH {activeMatch.id}</span>
          <div className="match-teams">
            <span className="match-our-team">{ourTeam}</span>
            <span className="match-sep">vs</span>
            <span className="match-enemy">{activeMatch.opponent}</span>
          </div>
          <div className="match-score"><span className="ms">{activeMatchWins}</span><span className="md"> – </span><span className="me">{activeMatchLosses}</span></div>
        </div>
      </div>
    ) : (
      <div className="no-match-banner" onClick={()=>setShowNewMatchModal(true)}>
        <div className="no-match-text">+ Start New Match</div>
      </div>
    )}

    {activeMatch && (
      <div className="phase-bar">
        <span className="phase-label">Status //</span>
        <span className="phase-name">{ready?"READY TO DEPLOY":`SELECT ${SQUAD_SIZE-selected.length} MORE`}</span>
        <span className="point-number">PT #{activeMatch.points.length+1}</span>
      </div>
    )}

    <div className="section-title">
      Roster ({roster.length}/{MAX_ROSTER})
      <button className="title-action" onClick={()=>{setShowRosterModal(true);setEditingId(null);setNewPlayerName("");}}>Edit Roster</button>
    </div>
    <div className="roster-grid">
      {roster.map((player,i)=>{
        const isSelected=selected.includes(player.id);
        const isMaxed=!activeMatch||(!isSelected&&selected.length>=SQUAD_SIZE);
        return (
          <div key={player.id} className={`player-card${isSelected?" selected":""}${isMaxed?" maxed":""}`} onClick={()=>activeMatch&&togglePlayer(player.id)}>
            <div className="card-top">
              <span className="player-num">{String(i+1).padStart(2,"0")}</span>
              <span className="check-indicator">
                <svg width="8" height="6" viewBox="0 0 8 6" fill="none"><path d="M1 3L3 5L7 1" stroke="#071209" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
              </span>
            </div>
            <div className="player-name">{player.name}</div>
          </div>
        );
      })}
    </div>

    {activeMatch && <>
      <div className="section-title">Active Squad</div>
      <div className="squad-panel">
        <div className="squad-header">
          <span className="squad-title">Deploying</span>
          <span className="squad-count"><span className="n">{selected.length}</span><span className="d"> / {SQUAD_SIZE}</span></span>
        </div>
        <div className="squad-slots">
          {slots.map((p,i)=>(
            <div key={i} className={`squad-slot${p?"":" slot-empty"}`}>
              <span className="slot-num">#{i+1}</span>
              <span className="slot-name">{p?p.name:"—"}</span>
            </div>
          ))}
        </div>
      </div>
      <div className="action-row">
        <button className="btn btn-win" disabled={!ready} onClick={()=>recordPoint("win")}>▲ Point Won</button>
        <button className="btn btn-loss" disabled={!ready} onClick={()=>recordPoint("loss")}>▼ Point Lost</button>
        <button className="btn btn-ghost" disabled={selected.length===0} onClick={()=>setSelected([])}>✕</button>
      </div>
      <div className="end-match-bar">
        <button className="btn-new-match" onClick={endMatch}>End Match</button>
        <button className="btn-new-match" onClick={()=>{endMatch();setTimeout(()=>setShowNewMatchModal(true),50);}}>End &amp; New Match</button>
      </div>
    </>}

    {!activeMatch&&matches.length>0&&(
      <div className="end-match-bar">
        <button className="btn-new-match" onClick={()=>setShowNewMatchModal(true)}>+ New Match</button>
      </div>
    )}

    {matches.length>0&&<>
      <div className="section-title">Match History</div>
      {[...matches].reverse().map(match=>{
        const mw=match.points.filter(p=>p.result==="win").length, ml=match.points.filter(p=>p.result==="loss").length, res=matchResult(match);
        return (
          <div key={match.id} className="match-block">
            <div className="match-block-header">
              <span className="match-block-num">MATCH {match.id}</span>
              <div className="match-block-vs"><span className="our">{ourTeam}</span><span className="sep">vs</span><span className="enemy">{match.opponent}</span></div>
              <div className="match-block-score"><span className="sw">{mw}</span><span className="sd"> – </span><span className="sl">{ml}</span></div>
              <span className={`match-block-result ${res}`}>{matchResultLabel(match)}</span>
            </div>
            {[...match.points].reverse().map((pt,i)=>(
              <div key={i} className="point-row">
                <span className="pr-num">PT {String(pt.point).padStart(2,"0")}</span>
                <span className={`pr-result ${pt.result}`}>{pt.result==="win"?"WIN":"LOSS"}</span>
                <span className="pr-names">{pt.squad.map((p,j)=><span key={p.id}>{j>0?" · ":""}<span>{p.name}</span></span>)}</span>
              </div>
            ))}
            {match.points.length===0&&<div className="empty" style={{padding:"14px"}}>//  No points recorded</div>}
          </div>
        );
      })}
    </>}

    {playerStats.length>0&&<>
      <div className="section-title">Player Stats</div>
      <div className="stats-grid">
        {playerStats.map(p=>(
          <div key={p.id} className="stat-card">
            <div className="stat-card-name">{p.name}</div>
            <div className="stat-bars">
              <div className="mini-bar-wrap"><div className="mini-bar-fill win" style={{width:`${p.total>0?(p.w/p.total)*100:0}%`}}/></div>
              <div className="mini-bar-wrap"><div className="mini-bar-fill loss" style={{width:`${p.total>0?(p.l/p.total)*100:0}%`}}/></div>
            </div>
            <div className="stat-nums"><span className="w">{p.w}W</span><span className="l">{p.l}L</span><span className="stat-pct">{p.pct!==null?`${p.pct}%`:"—"}</span></div>
          </div>
        ))}
      </div>
    </>}

    {allPoints.length===0&&matches.length===0&&<div className="empty">// Start a match to begin tracking points</div>}
  </div>

  {showNewMatchModal&&(
    <div className="modal-backdrop" onClick={()=>setShowNewMatchModal(false)}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-header"><span className="modal-title">New Match</span><button className="modal-close" onClick={()=>setShowNewMatchModal(false)}>✕</button></div>
        <div className="modal-body">
          <div className="field-group">
            <label className="field-label">Opponent Team Name</label>
            <input ref={opponentRef} className="field-input" placeholder="Enemy team…" value={newMatchOpponent} onChange={e=>setNewMatchOpponent(e.target.value)} onKeyDown={e=>e.key==="Enter"&&newMatchOpponent.trim()&&startNewMatch()} maxLength={24}/>
          </div>
          <button className="modal-submit" disabled={!newMatchOpponent.trim()} onClick={startNewMatch}>Start Match</button>
        </div>
      </div>
    </div>
  )}

  {showRosterModal&&(
    <div className="modal-backdrop" onClick={()=>{setShowRosterModal(false);setEditingId(null);}}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-header"><span className="modal-title">Edit Roster</span><button className="modal-close" onClick={()=>{setShowRosterModal(false);setEditingId(null);}}>✕</button></div>
        <div className="modal-body">
          {roster.map((player,i)=>editingId===player.id?(
            <div key={player.id} className="name-edit-row">
              <input ref={editRef} className="name-input-field" value={editName} onChange={e=>setEditName(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")commitEdit();if(e.key==="Escape")setEditingId(null);}} maxLength={14}/>
              <button className="save-btn" onClick={commitEdit}>Save</button>
              <button className="cancel-btn" onClick={()=>setEditingId(null)}>✕</button>
            </div>
          ):(
            <div key={player.id} className="roster-row">
              <span className="roster-row-num">{String(i+1).padStart(2,"0")}</span>
              <span className="roster-row-name">{player.name}</span>
              <button className="row-btn edit" onClick={()=>{setEditingId(player.id);setEditName(player.name);}}>✎</button>
              <button className="row-btn remove" onClick={()=>removePlayer(player.id)}>−</button>
            </div>
          ))}
        </div>
        <div className="modal-footer">
          {roster.length<MAX_ROSTER?(
            <><input ref={addRef} className="add-input" placeholder="Add player name…" value={newPlayerName} onChange={e=>setNewPlayerName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addPlayer()} maxLength={14}/><button className="add-btn" disabled={!newPlayerName.trim()} onClick={addPlayer}>+ Add</button></>
          ):<span className="roster-full-msg">ROSTER FULL — {MAX_ROSTER}/{MAX_ROSTER}</span>}
        </div>
      </div>
    </div>
  )}
</>

);
}
ReactDOM.render(<App/>, document.getElementById(“root”));
</script>
