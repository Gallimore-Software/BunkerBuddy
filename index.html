  if (editingId !== null && editRef.current) { editRef.current.focus(); editRef.current.select(); }
}, [editingId]);

useEffect(function() {
  if (editingTeam && teamInputRef.current) { teamInputRef.current.focus(); teamInputRef.current.select(); }
}, [editingTeam]);

useEffect(function() {
  if (showNewMatchModal) setTimeout(function(){ if(opponentRef.current) opponentRef.current.focus(); }, 80);
}, [showNewMatchModal]);

useEffect(function() {
  if (isFirst.current) { isFirst.current = false; return; }
  setSaveStatus("saving");
  clearTimeout(saveTimer.current);
  saveTimer.current = setTimeout(function() {
    doSave({ourTeam:ourTeam, roster:roster, matches:matches, nextPlayerId:nextPlayerId, nextMatchId:nextMatchId});
    setSaveStatus("saved");
    saveTimer.current = setTimeout(function(){ setSaveStatus("hidden"); }, 2000);
  }, 600);
}, [ourTeam, roster, matches, nextPlayerId, nextMatchId]);

// Derived
var activeMatch = (matches.length > 0 && !matches[matches.length-1].ended) ? matches[matches.length-1] : null;
var allPoints = matches.reduce(function(acc, m){ return acc.concat(m.points); }, []);
var totalWins = allPoints.filter(function(p){ return p.result === "win"; }).length;
var totalLosses = allPoints.filter(function(p){ return p.result === "loss"; }).length;
var ready = selected.length === SQUAD_SIZE;
var activeMatchWins = activeMatch ? activeMatch.points.filter(function(p){ return p.result === "win"; }).length : 0;
var activeMatchLosses = activeMatch ? activeMatch.points.filter(function(p){ return p.result === "loss"; }).length : 0;

// Handlers
function commitTeamEdit() {
  var t = teamDraft.trim();
  if (t) setOurTeam(t);
  setEditingTeam(false);
}

function startNewMatch() {
  var t = newMatchOpponent.trim();
  if (!t) return;
  var nm = {id: nextMatchId, opponent: t, points: [], ended: false};
  setMatches(function(prev){ return prev.concat([nm]); });
  setNextMatchId(function(n){ return n + 1; });
  setNewMatchOpponent("");
  setShowNewMatchModal(false);
  setSelected([]);
}

function endMatch() {
  setMatches(function(prev){
    return prev.map(function(m, i){ return i === prev.length-1 ? Object.assign({}, m, {ended:true}) : m; });
  });
  setSelected([]);
}

function togglePlayer(id) {
  setSelected(function(prev){
    if (prev.indexOf(id) !== -1) return prev.filter(function(x){ return x !== id; });
    if (prev.length < SQUAD_SIZE) return prev.concat([id]);
    return prev;
  });
}

function recordPoint(result) {
  if (!activeMatch || !ready) return;
  var squad = selected.map(function(id){ return roster.find(function(p){ return p.id === id; }); });
  var pt = {point: activeMatch.points.length + 1, result: result, squad: squad};
  setMatches(function(prev){
    return prev.map(function(m, i){ return i === prev.length-1 ? Object.assign({}, m, {points: m.points.concat([pt])}) : m; });
  });
  setFlash(result);
  setTimeout(function(){ setFlash(null); }, 300);
  setSelected([]);
}

function commitEdit() {
  var t = editName.trim();
  if (t && editingId !== null) {
    setRoster(function(prev){ return prev.map(function(p){ return p.id === editingId ? {id:p.id, name:t} : p; }); });
  }
  setEditingId(null);
}

function addPlayer() {
  var t = newPlayerName.trim();
  if (!t || roster.length >= MAX_ROSTER) return;
  var nid = nextPlayerId;
  setRoster(function(prev){ return prev.concat([{id:nid, name:t}]); });
  setNextPlayerId(function(n){ return n + 1; });
  setNewPlayerName("");
  if (addRef.current) addRef.current.focus();
}

function removePlayer(id) {
  setRoster(function(prev){ return prev.filter(function(p){ return p.id !== id; }); });
  setSelected(function(prev){ return prev.filter(function(x){ return x !== id; }); });
  if (editingId === id) setEditingId(null);
}

var slots = Array.from({length: SQUAD_SIZE}, function(_, i){
  var id = selected[i];
  return id ? roster.find(function(p){ return p.id === id; }) : null;
});

var playerStats = roster.map(function(player){
  var played = allPoints.filter(function(p){ return p.squad.some(function(s){ return s.id === player.id; }); });
  var w = played.filter(function(p){ return p.result === "win"; }).length;
  var l = played.filter(function(p){ return p.result === "loss"; }).length;
  var total = w + l;
  return {id:player.id, name:player.name, w:w, l:l, total:total, pct: total > 0 ? Math.round((w/total)*100) : null};
}).filter(function(p){ return p.total > 0; }).sort(function(a,b){ return b.total - a.total; });

// ── RENDER ──
return h("div", null,
  h("div", {className: "flash-overlay" + (flash ? " active" : ""), style: {background: flash === "win" ? "#4ade6a" : "#f25c54"}}),
  h("div", {className: "scanline"}),
  h("div", {className: "save-indicator " + saveStatus}, saveStatus === "saving" ? "Saving\u2026" : "Saved \u2713"),

  h("div", {className: "app"},

    // HEADER
    h("header", {className: "header"},
      h("div", {className: "header-left"},
        h("div", {className: "app-logo"}, "Bunker", h("span", null, "Buddy")),
        h("div", {className: "team-name-row"},
          h("span", {className: "team-name-label"}, "Team //"),
          editingTeam
            ? h("input", {ref: teamInputRef, className: "team-name-input", value: teamDraft,
                onChange: function(ev){ setTeamDraft(ev.target.value); },
                onBlur: commitTeamEdit,
                onKeyDown: function(ev){ if(ev.key==="Enter") commitTeamEdit(); if(ev.key==="Escape") setEditingTeam(false); },
                maxLength: 18})
            : h("span", {className: "team-name-display",
                onClick: function(){ setTeamDraft(ourTeam); setEditingTeam(true); }
              }, ourTeam)
        )
      ),
      h("div", {className: "header-stats"},
        h("div", {className: "stat-chip wins"}, h("span", {className: "lbl"}, "Wins"), h("span", {className: "val"}, totalWins)),
        h("div", {className: "stat-chip losses"}, h("span", {className: "lbl"}, "Losses"), h("span", {className: "val"}, totalLosses)),
        h("div", {className: "stat-chip pts"}, h("span", {className: "lbl"}, "Points"), h("span", {className: "val"}, allPoints.length))
      )
    ),

    // MATCH BANNER
    activeMatch
      ? h("div", {className: "match-banner"},
          h("div", {className: "match-banner-inner"},
            h("span", {className: "match-num"}, "MATCH " + activeMatch.id),
            h("div", {className: "match-teams"},
              h("span", {className: "match-our-team"}, ourTeam),
              h("span", {className: "match-sep"}, " vs "),
              h("span", {className: "match-enemy"}, activeMatch.opponent)
            ),
            h("div", {className: "match-score"},
              h("span", {className: "ms"}, activeMatchWins),
              h("span", {className: "md"}, " \u2013 "),
              h("span", {className: "me"}, activeMatchLosses)
            )
          )
        )
      : h("div", {className: "no-match-banner", onClick: function(){ setShowNewMatchModal(true); }},
          h("div", {className: "no-match-text"}, "+ Start New Match")
        ),

    // PHASE BAR
    activeMatch && h("div", {className: "phase-bar"},
      h("span", {className: "phase-label"}, "Status //"),
      h("span", {className: "phase-name"}, ready ? "READY TO DEPLOY" : "SELECT " + (SQUAD_SIZE - selected.length) + " MORE"),
      h("span", {className: "point-number"}, "PT #" + (activeMatch.points.length + 1))
    ),

    // ROSTER
    h("div", {className: "section-title"},
      "Roster (" + roster.length + "/" + MAX_ROSTER + ")",
      h("button", {className: "title-action", onClick: function(){ setShowRosterModal(true); setEditingId(null); setNewPlayerName(""); }}, "Edit Roster")
    ),
    h("div", {className: "roster-grid"},
      roster.map(function(player, i){
        var isSelected = selected.indexOf(player.id) !== -1;
        var isMaxed = !activeMatch || (!isSelected && selected.length >= SQUAD_SIZE);
        return h("div", {
          key: player.id,
          className: "player-card" + (isSelected ? " selected" : "") + (isMaxed ? " maxed" : ""),
          onClick: function(){ if (activeMatch) togglePlayer(player.id); }
        },
          h("div", {className: "card-top"},
            h("span", {className: "player-num"}, pad(i+1)),
            h("span", {className: "check-indicator"}, h("span", {className: "check-dot"}))
          ),
          h("div", {className: "player-name"}, player.name)
        );
      })
    ),

    // SQUAD + ACTIONS
    activeMatch && h("div", null,
      h("div", {className: "section-title"}, "Active Squad"),
      h("div", {className: "squad-panel"},
        h("div", {className: "squad-header"},
          h("span", {className: "squad-title"}, "Deploying"),
          h("span", {className: "squad-count"}, h("span", {className: "n"}, selected.length), h("span", {className: "d"}, " / " + SQUAD_SIZE))
        ),
        h("div", {className: "squad-slots"},
          slots.map(function(p, i){
            return h("div", {key: i, className: "squad-slot" + (p ? "" : " slot-empty")},
              h("span", {className: "slot-num"}, "#" + (i+1)),
              h("span", {className: "slot-name"}, p ? p.name : "\u2014")
            );
          })
        )
      ),
      h("div", {className: "action-row"},
        h("button", {className: "btn btn-win", disabled: !ready, onClick: function(){ recordPoint("win"); }}, "\u25b2 Point Won"),
        h("button", {className: "btn btn-loss", disabled: !ready, onClick: function(){ recordPoint("loss"); }}, "\u25bc Point Lost"),
        h("button", {className: "btn btn-ghost", disabled: selected.length === 0, onClick: function(){ setSelected([]); }}, "\u2715")
      ),
      h("div", {className: "end-match-bar"},
        h("button", {className: "btn-outline", onClick: endMatch}, "End Match"),
        h("button", {className: "btn-outline", onClick: function(){ endMatch(); setTimeout(function(){ setShowNewMatchModal(true); }, 50); }}, "End & New Match")
      )
    ),

    !activeMatch && matches.length > 0 && h("div", {className: "end-match-bar"},
      h("button", {className: "btn-outline", onClick: function(){ setShowNewMatchModal(true); }}, "+ New Match")
    ),

    // MATCH HISTORY
    matches.length > 0 && h("div", null,
      h("div", {className: "section-title"}, "Match History"),
      matches.slice().reverse().map(function(match){
        var mw = match.points.filter(function(p){ return p.result==="win"; }).length;
        var ml = match.points.filter(function(p){ return p.result==="loss"; }).length;
        var res = getMatchResult(match);
        return h("div", {key: match.id, className: "match-block"},
          h("div", {className: "match-block-header"},
            h("span", {className: "match-block-num"}, "MATCH " + match.id),
            h("div", {className: "match-block-vs"},
              h("span", {className: "mbv-our"}, ourTeam),
              h("span", {className: "mbv-sep"}, " vs "),
              h("span", {className: "mbv-enemy"}, match.opponent)
            ),
            h("div", {className: "match-block-score"},
              h("span", {className: "sw"}, mw),
              h("span", {className: "sd"}, " \u2013 "),
              h("span", {className: "sl"}, ml)
            ),
            h("span", {className: "match-block-result " + res}, getMatchLabel(match))
          ),
          match.points.slice().reverse().map(function(pt, i){
            return h("div", {key: i, className: "point-row"},
              h("span", {className: "pr-num"}, "PT " + pad(pt.point)),
              h("span", {className: "pr-result " + pt.result}, pt.result === "win" ? "WIN" : "LOSS"),
              h("span", {className: "pr-names"},
                pt.squad.map(function(p, j){
                  return h("span", {key: p.id}, j > 0 ? " \u00b7 " : "", h("b", null, p.name));
                })
              )
            );
          }),
          match.points.length === 0 && h("div", {className: "empty", style:{padding:"14px"}}, "// No points recorded")
        );
      })
    ),

    // PLAYER STATS
    playerStats.length > 0 && h("div", null,
      h("div", {className: "section-title"}, "Player Stats"),
      h("div", {className: "stats-grid"},
        playerStats.map(function(p){
          var wPct = p.total > 0 ? (p.w / p.total) * 100 : 0;
          var lPct = p.total > 0 ? (p.l / p.total) * 100 : 0;
          return h("div", {key: p.id, className: "stat-card"},
            h("div", {className: "stat-card-name"}, p.name),
            h("div", {className: "stat-bars"},
              h("div", {className: "mini-bar-wrap"}, h("div", {className: "mini-bar-fill win", style:{width: wPct + "%"}})),
              h("div", {className: "mini-bar-wrap"}, h("div", {className: "mini-bar-fill loss", style:{width: lPct + "%"}}))
            ),
            h("div", {className: "stat-nums"},
              h("span", {className: "wc"}, p.w + "W"),
              h("span", {className: "lc"}, p.l + "L"),
              h("span", {className: "stat-pct"}, p.pct !== null ? p.pct + "%" : "\u2014")
            )
          );
        })
      )
    ),

    allPoints.length === 0 && matches.length === 0 && h("div", {className: "empty"}, "// Start a match to begin tracking points")
  ),

  // NEW MATCH MODAL
  showNewMatchModal && h("div", {className: "modal-backdrop", onClick: function(){ setShowNewMatchModal(false); }},
    h("div", {className: "modal", onClick: function(ev){ ev.stopPropagation(); }},
      h("div", {className: "modal-header"},
        h("span", {className: "modal-title"}, "New Match"),
        h("button", {className: "modal-close", onClick: function(){ setShowNewMatchModal(false); }}, "\u2715")
      ),
      h("div", {className: "modal-body"},
        h("div", {className: "field-group"},
          h("label", {className: "field-label"}, "Opponent Team Name"),
          h("input", {ref: opponentRef, className: "field-input", placeholder: "Enemy team\u2026",
            value: newMatchOpponent,
            onChange: function(ev){ setNewMatchOpponent(ev.target.value); },
            onKeyDown: function(ev){ if (ev.key === "Enter" && newMatchOpponent.trim()) startNewMatch(); },
            maxLength: 24})
        ),
        h("button", {className: "modal-submit", disabled: !newMatchOpponent.trim(), onClick: startNewMatch}, "Start Match")
      )
    )
  ),

  // ROSTER MODAL
  showRosterModal && h("div", {className: "modal-backdrop", onClick: function(){ setShowRosterModal(false); setEditingId(null); }},
    h("div", {className: "modal", onClick: function(ev){ ev.stopPropagation(); }},
      h("div", {className: "modal-header"},
        h("span", {className: "modal-title"}, "Edit Roster"),
        h("button", {className: "modal-close", onClick: function(){ setShowRosterModal(false); setEditingId(null); }}, "\u2715")
      ),
      h("div", {className: "modal-body"},
        roster.map(function(player, i){
          return editingId === player.id
            ? h("div", {key: player.id, className: "name-edit-row"},
                h("input", {ref: editRef, className: "name-input-field", value: editName,
                  onChange: function(ev){ setEditName(ev.target.value); },
                  onKeyDown: function(ev){ if(ev.key==="Enter") commitEdit(); if(ev.key==="Escape") setEditingId(null); },
                  maxLength: 14}),
                h("button", {className: "save-btn", onClick: commitEdit}, "Save"),
                h("button", {className: "cancel-btn", onClick: function(){ setEditingId(null); }}, "\u2715")
              )
            : h("div", {key: player.id, className: "roster-row"},
                h("span", {className: "roster-row-num"}, pad(i+1)),
                h("span", {className: "roster-row-name"}, player.name),
                h("button", {className: "row-btn edit", onClick: function(){ setEditingId(player.id); setEditName(player.name); }}, "\u270e"),
                h("button", {className: "row-btn remove", onClick: function(){ removePlayer(player.id); }}, "\u2212")
              );
        })
      ),
      h("div", {className: "modal-footer"},
        roster.length < MAX_ROSTER
          ? h("div", {style:{display:"flex", gap:"8px", flex:1}},
              h("input", {ref: addRef, className: "add-input", placeholder: "Add player name\u2026",
                value: newPlayerName,
                onChange: function(ev){ setNewPlayerName(ev.target.value); },
                onKeyDown: function(ev){ if(ev.key==="Enter") addPlayer(); },
                maxLength: 14}),
              h("button", {className: "add-btn", disabled: !newPlayerName.trim(), onClick: addPlayer}, "+ Add")
            )
          : h("span", {className: "roster-full-msg"}, "ROSTER FULL \u2014 " + MAX_ROSTER + "/" + MAX_ROSTER)
      )
    )
  )
);
