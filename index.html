<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BunkerBuddy</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:#0a0c09;--surface:#111510;--surface2:#181d15;
  --border:#2a3326;--border2:#1e2a1c;
  --green:#4ade6a;--green-dim:#1a3d22;--green-glow:rgba(74,222,106,0.2);
  --red:#f25c54;--red-dim:#3d1410;--amber:#f5a623;--amber-dim:#3d2a08;
  --blue:#5ab4f5;--blue-dim:#0e2030;
  --text:#c8d4c0;--text-dim:#5a6e52;
  --font-d:'Bebas Neue',sans-serif;
  --font-m:'Share Tech Mono',monospace;
  --font-b:'Barlow Condensed',sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--font-b);min-height:100vh;overflow-x:hidden;}
.scanline{pointer-events:none;position:fixed;inset:0;z-index:9999;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.055) 2px,rgba(0,0,0,0.055) 4px);}
.app{max-width:880px;margin:0 auto;padding:0 16px 100px;position:relative;z-index:1;}
.save-indicator{position:fixed;bottom:16px;right:16px;z-index:500;font-family:var(--font-m);font-size:9px;letter-spacing:2px;text-transform:uppercase;padding:5px 10px;border-radius:2px;background:var(--surface);border:1px solid var(--border);color:var(--text-dim);transition:opacity 0.4s;pointer-events:none;}
.save-indicator.saving{color:var(--amber);border-color:var(--amber);opacity:1;}
.save-indicator.saved{color:var(--green);border-color:var(--green);}
.save-indicator.hidden{opacity:0;}
.header{padding:22px 0 16px;border-bottom:1px solid var(--border);display:flex;align-items:flex-end;justify-content:space-between;gap:12px;flex-wrap:wrap;}
.header-left{display:flex;flex-direction:column;gap:2px;}
.app-logo{font-family:var(--font-d);font-size:46px;letter-spacing:3px;line-height:1;color:var(--green);text-shadow:0 0 30px var(--green-glow);}
.app-logo span{color:var(--text-dim);}
.team-name-row{display:flex;align-items:center;gap:8px;margin-top:4px;}
.team-name-label{font-family:var(--font-m);font-size:9px;color:var(--text-dim);letter-spacing:2px;}
.team-name-display{font-family:var(--font-d);font-size:18px;letter-spacing:2px;color:var(--amber);cursor:pointer;border-bottom:1px dashed transparent;transition:border-color 0.15s;line-height:1.1;}
.team-name-display:hover{border-color:var(--amber);}
.team-name-input{font-family:var(--font-d);font-size:18px;letter-spacing:2px;color:var(--amber);background:transparent;border:none;border-bottom:1px solid var(--amber);outline:none;caret-color:var(--amber);width:160px;}
.header-stats{display:flex;gap:16px;align-items:flex-end;}
.stat-chip{display:flex;flex-direction:column;align-items:flex-end;gap:1px;}
.stat-chip .lbl{font-family:var(--font-m);font-size:9px;color:var(--text-dim);letter-spacing:1.5px;text-transform:uppercase;}
.stat-chip .val{font-family:var(--font-d);font-size:26px;line-height:1;}
.stat-chip.wins .val{color:var(--green);}.stat-chip.losses .val{color:var(--red);}.stat-chip.pts .val{color:var(--amber);}
.match-banner{margin-top:16px;background:var(--surface);border:1px solid var(--border);border-radius:4px;overflow:hidden;}
.match-banner-inner{padding:12px 16px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
.match-num{font-family:var(--font-m);font-size:9px;color:var(--text-dim);letter-spacing:2px;}
.match-teams{display:flex;align-items:center;gap:10px;flex:1;min-width:0;}
.match-our-team{font-family:var(--font-d);font-size:22px;letter-spacing:2px;color:var(--green);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.match-sep{font-family:var(--font-m);font-size:12px;color:var(--text-dim);}
.match-enemy{font-family:var(--font-d);font-size:22px;letter-spacing:2px;color:var(--red);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.match-score{font-family:var(--font-d);font-size:28px;letter-spacing:2px;white-space:nowrap;}
.match-score .ms{color:var(--green);}.match-score .md{color:var(--text-dim);}.match-score .me{color:var(--red);}
.no-match-banner{margin-top:16px;border:1px dashed var(--border);border-radius:4px;padding:20px;text-align:center;cursor:pointer;transition:border-color 0.15s,background 0.15s;}
.no-match-banner:hover{border-color:var(--green);background:var(--green-dim);}
.no-match-text{font-family:var(--font-m);font-size:11px;color:var(--text-dim);letter-spacing:2px;text-transform:uppercase;}
.no-match-banner:hover .no-match-text{color:var(--green);}
.phase-bar{margin-top:14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.phase-label{font-family:var(--font-m);font-size:10px;color:var(--text-dim);letter-spacing:2px;}
.phase-name{font-family:var(--font-d);font-size:19px;letter-spacing:2px;color:var(--amber);}
.point-number{margin-left:auto;font-family:var(--font-m);font-size:11px;color:var(--text-dim);}
.section-title{font-family:var(--font-m);font-size:10px;color:var(--text-dim);letter-spacing:3px;text-transform:uppercase;margin:20px 0 10px;display:flex;align-items:center;gap:10px;}
.section-title::after{content:'';flex:1;height:1px;background:var(--border);}
.title-action{background:none;border:1px solid var(--border);color:var(--text-dim);font-family:var(--font-m);font-size:9px;letter-spacing:1.5px;text-transform:uppercase;padding:3px 10px;border-radius:2px;cursor:pointer;transition:all 0.15s;white-space:nowrap;}
.title-action:hover{border-color:var(--amber);color:var(--amber);}
.roster-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
@media(min-width:500px){.roster-grid{grid-template-columns:repeat(4,1fr);}}
.player-card{background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:11px 12px 9px;cursor:pointer;transition:background 0.12s,border-color 0.12s;display:flex;flex-direction:column;gap:5px;user-select:none;position:relative;overflow:hidden;min-width:0;}
.player-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--border);transition:background 0.12s;}
.player-card:hover{background:var(--surface2);border-color:#3a4a36;}
.player-card.selected{background:var(--green-dim);border-color:var(--green);}
.player-card.selected::before{background:var(--green);}
.player-card.maxed{opacity:0.28;pointer-events:none;}
.card-top{display:flex;align-items:center;justify-content:space-between;}
.player-num{font-family:var(--font-m);font-size:9px;color:var(--text-dim);}
.player-card.selected .player-num{color:var(--green);}
.check-indicator{width:14px;height:14px;border-radius:50%;border:1.5px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all 0.12s;}
.player-card.selected .check-indicator{background:var(--green);border-color:var(--green);box-shadow:0 0 8px rgba(74,222,106,0.4);}
.check-dot{display:none;width:6px;height:6px;border-radius:50%;background:#071209;}
.player-card.selected .check-dot{display:block;}
.player-name{font-family:var(--font-b);font-size:15px;font-weight:700;text-transform:uppercase;letter-spacing:0.3px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.player-card.selected .player-name{color:#e8ffec;}
.squad-panel{background:var(--surface);border:1px solid var(--border);border-radius:4px;overflow:hidden;}
.squad-header{padding:9px 14px;background:var(--surface2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.squad-title{font-family:var(--font-m);font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--text-dim);}
.squad-count{font-family:var(--font-d);font-size:18px;}
.squad-count .n{color:var(--green);}.squad-count .d{color:var(--text-dim);}
.squad-slots{display:flex;}
.squad-slot{flex:1;padding:10px 6px;border-right:1px solid var(--border);text-align:center;min-width:0;overflow:hidden;}
.squad-slot:last-child{border-right:none;}
.slot-num{display:block;font-family:var(--font-m);font-size:9px;color:var(--text-dim);margin-bottom:3px;}
.slot-name{font-family:var(--font-b);font-size:13px;font-weight:700;text-transform:uppercase;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block;}
.slot-empty .slot-name{color:var(--text-dim);font-weight:400;}
.action-row{margin-top:14px;display:flex;gap:8px;}
.btn{font-family:var(--font-b);font-size:14px;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:13px 20px;border-radius:3px;border:none;cursor:pointer;transition:all 0.15s;flex:1;}
.btn:disabled{opacity:0.28;cursor:not-allowed;}
.btn-win{background:var(--green);color:#071209;}
.btn-win:hover:not(:disabled){background:#6ef085;box-shadow:0 0 20px rgba(74,222,106,0.3);}
.btn-loss{background:var(--red);color:#1a0403;}
.btn-loss:hover:not(:disabled){background:#f87068;box-shadow:0 0 20px rgba(242,92,84,0.3);}
.btn-ghost{background:transparent;color:var(--text-dim);border:1px solid var(--border);flex:0;padding:13px 14px;font-size:16px;letter-spacing:0;}
.btn-ghost:hover:not(:disabled){border-color:#5a6e52;color:var(--text);}
.btn-outline{background:transparent;color:var(--text-dim);border:1px solid var(--border);font-family:var(--font-b);font-size:13px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:10px 18px;border-radius:3px;cursor:pointer;transition:all 0.15s;white-space:nowrap;}
.btn-outline:hover{border-color:var(--blue);color:var(--blue);}
.end-match-bar{margin-top:10px;display:flex;gap:8px;align-items:center;justify-content:flex-end;flex-wrap:wrap;}
.match-block{margin-bottom:14px;border:1px solid var(--border);border-radius:4px;overflow:hidden;}
.match-block-header{background:var(--surface2);padding:10px 14px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;border-bottom:1px solid var(--border);}
.match-block-num{font-family:var(--font-m);font-size:9px;color:var(--text-dim);letter-spacing:1.5px;}
.match-block-vs{font-family:var(--font-d);font-size:18px;letter-spacing:1.5px;flex:1;min-width:0;}
.match-block-vs .our{color:var(--green);}.match-block-vs .sep{color:var(--text-dim);margin:0 6px;font-size:14px;}.match-block-vs .enemy{color:var(--red);}
.match-block-score{font-family:var(--font-d);font-size:22px;letter-spacing:1px;white-space:nowrap;}
.match-block-score .sw{color:var(--green);}.match-block-score .sd{color:var(--text-dim);}.match-block-score .sl{color:var(--red);}
.match-block-result{font-family:var(--font-m);font-size:10px;letter-spacing:1.5px;padding:3px 8px;border-radius:2px;}
.match-block-result.won{background:var(--green-dim);color:var(--green);border:1px solid var(--green);}
.match-block-result.lost{background:var(--red-dim);color:var(--red);border:1px solid var(--red);}
.match-block-result.tied{background:var(--amber-dim);color:var(--amber);border:1px solid var(--amber);}
.match-block-result.live{background:var(--blue-dim);color:var(--blue);border:1px solid var(--blue);animation:pulse 1.4s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.5;}}
.point-row{padding:8px 14px;border-bottom:1px solid var(--border2);display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.point-row:last-child{border-bottom:none;}
.pr-num{font-family:var(--font-m);font-size:10px;color:var(--text-dim);min-width:38px;}
.pr-result{font-family:var(--font-d);font-size:14px;letter-spacing:2px;min-width:44px;}
.pr-result.win{color:var(--green);}.pr-result.loss{color:var(--red);}
.pr-names{font-family:var(--font-b);font-size:13px;font-weight:600;color:var(--text-dim);flex:1;min-width:0;}
.pr-names b{color:var(--text);font-weight:600;}
.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;}
@media(min-width:500px){.stats-grid{grid-template-columns:repeat(3,1fr);}}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:10px 12px;}
.stat-card-name{font-family:var(--font-b);font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:0.3px;color:var(--text);margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.stat-bars{display:flex;gap:4px;}
.mini-bar-wrap{flex:1;height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
.mini-bar-fill{height:100%;border-radius:2px;transition:width 0.4s ease;}
.mini-bar-fill.win{background:var(--green);}.mini-bar-fill.loss{background:var(--red);}
.stat-nums{font-family:var(--font-m);font-size:11px;color:var(--text-dim);display:flex;gap:8px;margin-top:5px;}
.stat-nums .w{color:var(--green);}.stat-nums .l{color:var(--red);}
.stat-pct{font-family:var(--font-m);font-size:11px;color:var(--amber);margin-left:auto;}
.empty{padding:30px;text-align:center;font-family:var(--font-m);font-size:11px;color:var(--text-dim);letter-spacing:2px;text-transform:uppercase;}
.flash-overlay{pointer-events:none;position:fixed;inset:0;z-index:9997;opacity:0;transition:opacity 0.05s;}
.flash-overlay.active{opacity:0.07;transition:opacity 0s;}
.modal-backdrop{position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,0.8);display:flex;align-items:center;justify-content:center;padding:20px;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:6px;width:100%;max-width:420px;overflow:hidden;}
.modal-header{padding:14px 18px;background:var(--surface2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.modal-title{font-family:var(--font-d);font-size:22px;letter-spacing:2px;color:var(--text);}
.modal-close{background:none;border:none;color:var(--text-dim);font-size:18px;cursor:pointer;padding:2px 6px;border-radius:2px;transition:color 0.12s;line-height:1;}
.modal-close:hover{color:var(--text);}
.modal-body{padding:16px 18px;max-height:55vh;overflow-y:auto;}
.modal-footer{padding:12px 18px;border-top:1px solid var(--border);display:flex;gap:8px;align-items:center;}
.roster-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);}
.roster-row:last-child{border-bottom:none;}
.roster-row-num{font-family:var(--font-m);font-size:10px;color:var(--text-dim);min-width:22px;}
.roster-row-name{font-family:var(--font-b);font-size:15px;font-weight:700;text-transform:uppercase;color:var(--text);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0;}
.row-btn{background:none;border:1px solid var(--border);color:var(--text-dim);font-size:13px;padding:4px 10px;border-radius:2px;cursor:pointer;transition:all 0.12s;flex-shrink:0;font-family:var(--font-m);}
.row-btn.edit:hover{border-color:var(--amber);color:var(--amber);}
.row-btn.remove:hover{border-color:var(--red);color:var(--red);}
.name-edit-row{display:flex;gap:8px;align-items:center;padding:6px 0;border-bottom:1px solid var(--border);}
.name-edit-row:last-child{border-bottom:none;}
.name-input-field{flex:1;background:#0d1a0c;border:1px solid var(--amber);color:#fff;font-family:var(--font-b);font-size:15px;font-weight:700;text-transform:uppercase;padding:6px 10px;border-radius:3px;outline:none;min-width:0;}
.save-btn{background:var(--amber);color:#1a0e00;border:none;font-family:var(--font-b);font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:6px 14px;border-radius:3px;cursor:pointer;flex-shrink:0;}
.cancel-btn{background:none;border:1px solid var(--border);color:var(--text-dim);font-size:14px;padding:6px 10px;border-radius:3px;cursor:pointer;flex-shrink:0;}
.add-input{flex:1;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:var(--font-b);font-size:14px;font-weight:700;text-transform:uppercase;padding:9px 12px;border-radius:3px;outline:none;transition:border-color 0.12s;min-width:0;}
.add-input:focus{border-color:var(--green);}
.add-input::placeholder{color:var(--text-dim);font-weight:400;text-transform:none;}
.add-btn{background:var(--green);color:#071209;border:none;font-family:var(--font-b);font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:9px 16px;border-radius:3px;cursor:pointer;flex-shrink:0;}
.add-btn:disabled{opacity:0.3;cursor:not-allowed;}
.roster-full-msg{font-family:var(--font-m);font-size:9px;color:var(--text-dim);letter-spacing:1px;}
.field-group{display:flex;flex-direction:column;gap:6px;margin-bottom:16px;}
.field-label{font-family:var(--font-m);font-size:9px;color:var(--text-dim);letter-spacing:2px;text-transform:uppercase;}
.field-input{background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:var(--font-b);font-size:16px;font-weight:700;text-transform:uppercase;padding:10px 14px;border-radius:3px;outline:none;transition:border-color 0.12s;width:100%;}
.field-input:focus{border-color:var(--green);}
.field-input::placeholder{color:var(--text-dim);font-weight:400;text-transform:none;}
.modal-submit{width:100%;background:var(--green);color:#071209;border:none;font-family:var(--font-b);font-size:15px;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:13px;border-radius:3px;cursor:pointer;transition:opacity 0.15s;margin-top:4px;}
.modal-submit:disabled{opacity:0.3;cursor:not-allowed;}
.modal-submit:hover:not(:disabled){opacity:0.85;}
</style>

<body>
<div id="root"></div>
<script>
"use strict";
const e = React.createElement;
const { useState, useRef, useEffect } = React;

const MAX_ROSTER = 12, SQUAD_SIZE = 5, STORAGE_KEY = “bunkerbuddy-v1”;
const DEFAULT = {
ourTeam: “Our Team”,
roster: [{id:1,name:“Viper”},{id:2,name:“Ghost”},{id:3,name:“Reaper”}],
matches: [], nextPlayerId: 4, nextMatchId: 1
};

function loadState() {
try { const s = localStorage.getItem(STORAGE_KEY); return s ? JSON.parse(s) : null; } catch { return null; }
}
function saveState(s) {
try { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); } catch {}
}
function matchResult(m) {
const w = m.points.filter(p => p.result === “win”).length;
const l = m.points.filter(p => p.result === “loss”).length;
if (!m.ended) return “live”;
if (w > l) return “won”;
if (l > w) return “lost”;
return “tied”;
}
function matchResultLabel(m) {
return {live:“LIVE”, won:“WIN”, lost:“LOSS”, tied:“TIE”}[matchResult(m)];
}

function App() {
const saved = loadState() || DEFAULT;
const [ourTeam, setOurTeam] = useState(saved.ourTeam);
const [editingTeam, setEditingTeam] = useState(false);
const [teamDraft, setTeamDraft] = useState(””);
const [roster, setRoster] = useState(saved.roster);
const [matches, setMatches] = useState(saved.matches);
const [nextPlayerId, setNextPlayerId] = useState(saved.nextPlayerId);
const [nextMatchId, setNextMatchId] = useState(saved.nextMatchId);
const [selected, setSelected] = useState([]);
const [flash, setFlash] = useState(null);
const [saveStatus, setSaveStatus] = useState(“hidden”);
const [showRosterModal, setShowRosterModal] = useState(false);
const [showNewMatchModal, setShowNewMatchModal] = useState(false);
const [newMatchOpponent, setNewMatchOpponent] = useState(””);
const [editingId, setEditingId] = useState(null);
const [editName, setEditName] = useState(””);
const [newPlayerName, setNewPlayerName] = useState(””);

const editRef = useRef(null);
const addRef = useRef(null);
const teamInputRef = useRef(null);
const opponentRef = useRef(null);
const saveTimer = useRef(null);
const isFirst = useRef(true);

useEffect(() => { if (editingId !== null && editRef.current) { editRef.current.focus(); editRef.current.select(); } }, [editingId]);
useEffect(() => { if (editingTeam && teamInputRef.current) { teamInputRef.current.focus(); teamInputRef.current.select(); } }, [editingTeam]);
useEffect(() => { if (showNewMatchModal) setTimeout(() => opponentRef.current && opponentRef.current.focus(), 50); }, [showNewMatchModal]);

useEffect(() => {
if (isFirst.current) { isFirst.current = false; return; }
setSaveStatus(“saving”);
clearTimeout(saveTimer.current);
saveTimer.current = setTimeout(() => {
saveState({ourTeam, roster, matches, nextPlayerId, nextMatchId});
setSaveStatus(“saved”);
saveTimer.current = setTimeout(() => setSaveStatus(“hidden”), 2000);
}, 600);
}, [ourTeam, roster, matches, nextPlayerId, nextMatchId]);

const activeMatch = matches.length > 0 && !matches[matches.length - 1].ended ? matches[matches.length - 1] : null;
const allPoints = matches.reduce((acc, m) => acc.concat(m.points), []);
const totalWins = allPoints.filter(p => p.result === “win”).length;
const totalLosses = allPoints.filter(p => p.result === “loss”).length;
const ready = selected.length === SQUAD_SIZE;
const activeMatchWins = activeMatch ? activeMatch.points.filter(p => p.result === “win”).length : 0;
const activeMatchLosses = activeMatch ? activeMatch.points.filter(p => p.result === “loss”).length : 0;

const commitTeamEdit = () => { const t = teamDraft.trim(); if (t) setOurTeam(t); setEditingTeam(false); };
const startNewMatch = () => {
const t = newMatchOpponent.trim(); if (!t) return;
setMatches(prev => prev.concat([{id: nextMatchId, opponent: t, points: [], ended: false}]));
setNextMatchId(n => n + 1); setNewMatchOpponent(””); setShowNewMatchModal(false); setSelected([]);
};
const endMatch = () => { setMatches(prev => prev.map((m, i) => i === prev.length - 1 ? Object.assign({}, m, {ended: true}) : m)); setSelected([]); };
const togglePlayer = id => setSelected(prev => prev.includes(id) ? prev.filter(x => x !== id) : prev.length < SQUAD_SIZE ? prev.concat([id]) : prev);
const recordPoint = result => {
if (!activeMatch || !ready) return;
const squad = selected.map(id => roster.find(p => p.id === id));
const pt = {point: activeMatch.points.length + 1, result, squad};
setMatches(prev => prev.map((m, i) => i === prev.length - 1 ? Object.assign({}, m, {points: m.points.concat([pt])}) : m));
setFlash(result); setTimeout(() => setFlash(null), 300); setSelected([]);
};
const commitEdit = () => { const t = editName.trim(); if (t && editingId !== null) setRoster(prev => prev.map(p => p.id === editingId ? {id: p.id, name: t} : p)); setEditingId(null); };
const addPlayer = () => {
const t = newPlayerName.trim(); if (!t || roster.length >= MAX_ROSTER) return;
setRoster(prev => prev.concat([{id: nextPlayerId, name: t}]));
setNextPlayerId(n => n + 1); setNewPlayerName(””); if (addRef.current) addRef.current.focus();
};
const removePlayer = id => { setRoster(prev => prev.filter(p => p.id !== id)); setSelected(prev => prev.filter(x => x !== id)); if (editingId === id) setEditingId(null); };

const slots = Array.from({length: SQUAD_SIZE}, (_, i) => { const id = selected[i]; return id ? roster.find(p => p.id === id) : null; });

const playerStats = roster.map(player => {
const played = allPoints.filter(p => p.squad.some(s => s.id === player.id));
const w = played.filter(p => p.result === “win”).length;
const l = played.filter(p => p.result === “loss”).length;
const total = w + l;
return {id: player.id, name: player.name, w, l, total, pct: total > 0 ? Math.round((w / total) * 100) : null};
}).filter(p => p.total > 0).sort((a, b) => b.total - a.total);

// ── RENDER ──
return e(“div”, null,
e(“div”, {className: “flash-overlay” + (flash ? “ active” : “”), style: {background: flash === “win” ? “#4ade6a” : “#f25c54”}}),
e(“div”, {className: “scanline”}),
e(“div”, {className: “save-indicator “ + saveStatus}, saveStatus === “saving” ? “Saving\u2026” : “Saved \u2713”),

e("div", {className: "app"},

  // HEADER
  e("header", {className: "header"},
    e("div", {className: "header-left"},
      e("div", {className: "app-logo"}, "Bunker", e("span", null, "Buddy")),
      e("div", {className: "team-name-row"},
        e("span", {className: "team-name-label"}, "Team //"),
        editingTeam
          ? e("input", {ref: teamInputRef, className: "team-name-input", value: teamDraft,
              onChange: ev => setTeamDraft(ev.target.value),
              onBlur: commitTeamEdit,
              onKeyDown: ev => { if (ev.key === "Enter") commitTeamEdit(); if (ev.key === "Escape") setEditingTeam(false); },
              maxLength: 18})
          : e("span", {className: "team-name-display", onClick: () => { setTeamDraft(ourTeam); setEditingTeam(true); }}, ourTeam)
      )
    ),
    e("div", {className: "header-stats"},
      e("div", {className: "stat-chip wins"}, e("span", {className: "lbl"}, "Wins"), e("span", {className: "val"}, totalWins)),
      e("div", {className: "stat-chip losses"}, e("span", {className: "lbl"}, "Losses"), e("span", {className: "val"}, totalLosses)),
      e("div", {className: "stat-chip pts"}, e("span", {className: "lbl"}, "Points"), e("span", {className: "val"}, allPoints.length))
    )
  ),

  // MATCH BANNER
  activeMatch
    ? e("div", {className: "match-banner"},
        e("div", {className: "match-banner-inner"},
          e("span", {className: "match-num"}, "MATCH " + activeMatch.id),
          e("div", {className: "match-teams"},
            e("span", {className: "match-our-team"}, ourTeam),
            e("span", {className: "match-sep"}, "vs"),
            e("span", {className: "match-enemy"}, activeMatch.opponent)
          ),
          e("div", {className: "match-score"},
            e("span", {className: "ms"}, activeMatchWins),
            e("span", {className: "md"}, " \u2013 "),
            e("span", {className: "me"}, activeMatchLosses)
          )
        )
      )
    : e("div", {className: "no-match-banner", onClick: () => setShowNewMatchModal(true)},
        e("div", {className: "no-match-text"}, "+ Start New Match")
      ),

  // PHASE BAR
  activeMatch && e("div", {className: "phase-bar"},
    e("span", {className: "phase-label"}, "Status //"),
    e("span", {className: "phase-name"}, ready ? "READY TO DEPLOY" : "SELECT " + (SQUAD_SIZE - selected.length) + " MORE"),
    e("span", {className: "point-number"}, "PT #" + (activeMatch.points.length + 1))
  ),

  // ROSTER
  e("div", {className: "section-title"},
    "Roster (" + roster.length + "/" + MAX_ROSTER + ")",
    e("button", {className: "title-action", onClick: () => { setShowRosterModal(true); setEditingId(null); setNewPlayerName(""); }}, "Edit Roster")
  ),
  e("div", {className: "roster-grid"},
    roster.map((player, i) => {
      const isSelected = selected.includes(player.id);
      const isMaxed = !activeMatch || (!isSelected && selected.length >= SQUAD_SIZE);
      return e("div", {
        key: player.id,
        className: "player-card" + (isSelected ? " selected" : "") + (isMaxed ? " maxed" : ""),
        onClick: () => activeMatch && togglePlayer(player.id)
      },
        e("div", {className: "card-top"},
          e("span", {className: "player-num"}, String(i + 1).padStart(2, "0")),
          e("span", {className: "check-indicator"}, e("span", {className: "check-dot"}))
        ),
        e("div", {className: "player-name"}, player.name)
      );
    })
  ),

  // SQUAD + ACTIONS (only during active match)
  activeMatch && e("div", null,
    e("div", {className: "section-title"}, "Active Squad"),
    e("div", {className: "squad-panel"},
      e("div", {className: "squad-header"},
        e("span", {className: "squad-title"}, "Deploying"),
        e("span", {className: "squad-count"}, e("span", {className: "n"}, selected.length), e("span", {className: "d"}, " / " + SQUAD_SIZE))
      ),
      e("div", {className: "squad-slots"},
        slots.map((p, i) =>
          e("div", {key: i, className: "squad-slot" + (p ? "" : " slot-empty")},
            e("span", {className: "slot-num"}, "#" + (i + 1)),
            e("span", {className: "slot-name"}, p ? p.name : "\u2014")
          )
        )
      )
    ),
    e("div", {className: "action-row"},
      e("button", {className: "btn btn-win", disabled: !ready, onClick: () => recordPoint("win")}, "\u25b2 Point Won"),
      e("button", {className: "btn btn-loss", disabled: !ready, onClick: () => recordPoint("loss")}, "\u25bc Point Lost"),
      e("button", {className: "btn btn-ghost", disabled: selected.length === 0, onClick: () => setSelected([])}, "\u2715")
    ),
    e("div", {className: "end-match-bar"},
      e("button", {className: "btn-outline", onClick: endMatch}, "End Match"),
      e("button", {className: "btn-outline", onClick: () => { endMatch(); setTimeout(() => setShowNewMatchModal(true), 50); }}, "End & New Match")
    )
  ),

  !activeMatch && matches.length > 0 && e("div", {className: "end-match-bar"},
    e("button", {className: "btn-outline", onClick: () => setShowNewMatchModal(true)}, "+ New Match")
  ),

  // MATCH HISTORY
  matches.length > 0 && e("div", null,
    e("div", {className: "section-title"}, "Match History"),
    matches.slice().reverse().map(match => {
      const mw = match.points.filter(p => p.result === "win").length;
      const ml = match.points.filter(p => p.result === "loss").length;
      const res = matchResult(match);
      return e("div", {key: match.id, className: "match-block"},
        e("div", {className: "match-block-header"},
          e("span", {className: "match-block-num"}, "MATCH " + match.id),
          e("div", {className: "match-block-vs"},
            e("span", {className: "our"}, ourTeam),
            e("span", {className: "sep"}, "vs"),
            e("span", {className: "enemy"}, match.opponent)
          ),
          e("div", {className: "match-block-score"},
            e("span", {className: "sw"}, mw),
            e("span", {className: "sd"}, " \u2013 "),
            e("span", {className: "sl"}, ml)
          ),
          e("span", {className: "match-block-result " + res}, matchResultLabel(match))
        ),
        match.points.slice().reverse().map((pt, i) =>
          e("div", {key: i, className: "point-row"},
            e("span", {className: "pr-num"}, "PT " + String(pt.point).padStart(2, "0")),
            e("span", {className: "pr-result " + pt.result}, pt.result === "win" ? "WIN" : "LOSS"),
            e("span", {className: "pr-names"},
              pt.squad.map((p, j) => e("span", {key: p.id}, (j > 0 ? " \u00b7 " : ""), e("b", null, p.name)))
            )
          )
        ),
        match.points.length === 0 && e("div", {className: "empty", style: {padding: "14px"}}, "// No points recorded")
      );
    })
  ),

  // PLAYER STATS
  playerStats.length > 0 && e("div", null,
    e("div", {className: "section-title"}, "Player Stats"),
    e("div", {className: "stats-grid"},
      playerStats.map(p =>
        e("div", {key: p.id, className: "stat-card"},
          e("div", {className: "stat-card-name"}, p.name),
          e("div", {className: "stat-bars"},
            e("div", {className: "mini-bar-wrap"}, e("div", {className: "mini-bar-fill win", style: {width: (p.total > 0 ? (p.w / p.total) * 100 : 0) + "%"}})),
            e("div", {className: "mini-bar-wrap"}, e("div", {className: "mini-bar-fill loss", style: {width: (p.total > 0 ? (p.l / p.total) * 100 : 0) + "%"}}))
          ),
          e("div", {className: "stat-nums"},
            e("span", {className: "w"}, p.w + "W"),
            e("span", {className: "l"}, p.l + "L"),
            e("span", {className: "stat-pct"}, p.pct !== null ? p.pct + "%" : "\u2014")
          )
        )
      )
    )
  ),

  allPoints.length === 0 && matches.length === 0 && e("div", {className: "empty"}, "// Start a match to begin tracking points")
),

// NEW MATCH MODAL
showNewMatchModal && e("div", {className: "modal-backdrop", onClick: () => setShowNewMatchModal(false)},
  e("div", {className: "modal", onClick: ev => ev.stopPropagation()},
    e("div", {className: "modal-header"},
      e("span", {className: "modal-title"}, "New Match"),
      e("button", {className: "modal-close", onClick: () => setShowNewMatchModal(false)}, "\u2715")
    ),
    e("div", {className: "modal-body"},
      e("div", {className: "field-group"},
        e("label", {className: "field-label"}, "Opponent Team Name"),
        e("input", {ref: opponentRef, className: "field-input", placeholder: "Enemy team\u2026",
          value: newMatchOpponent,
          onChange: ev => setNewMatchOpponent(ev.target.value),
          onKeyDown: ev => ev.key === "Enter" && newMatchOpponent.trim() && startNewMatch(),
          maxLength: 24})
      ),
      e("button", {className: "modal-submit", disabled: !newMatchOpponent.trim(), onClick: startNewMatch}, "Start Match")
    )
  )
),

// ROSTER MODAL
showRosterModal && e("div", {className: "modal-backdrop", onClick: () => { setShowRosterModal(false); setEditingId(null); }},
  e("div", {className: "modal", onClick: ev => ev.stopPropagation()},
    e("div", {className: "modal-header"},
      e("span", {className: "modal-title"}, "Edit Roster"),
      e("button", {className: "modal-close", onClick: () => { setShowRosterModal(false); setEditingId(null); }}, "\u2715")
    ),
    e("div", {className: "modal-body"},
      roster.map((player, i) =>
        editingId === player.id
          ? e("div", {key: player.id, className: "name-edit-row"},
              e("input", {ref: editRef, className: "name-input-field", value: editName,
                onChange: ev => setEditName(ev.target.value),
                onKeyDown: ev => { if (ev.key === "Enter") commitEdit(); if (ev.key === "Escape") setEditingId(null); },
                maxLength: 14}),
              e("button", {className: "save-btn", onClick: commitEdit}, "Save"),
              e("button", {className: "cancel-btn", onClick: () => setEditingId(null)}, "\u2715")
            )
          : e("div", {key: player.id, className: "roster-row"},
              e("span", {className: "roster-row-num"}, String(i + 1).padStart(2, "0")),
              e("span", {className: "roster-row-name"}, player.name),
              e("button", {className: "row-btn edit", onClick: () => { setEditingId(player.id); setEditName(player.name); }}, "\u270e"),
              e("button", {className: "row-btn remove", onClick: () => removePlayer(player.id)}, "\u2212")
            )
      )
    ),
    e("div", {className: "modal-footer"},
      roster.length < MAX_ROSTER
        ? e("div", {style: {display:"flex", gap:"8px", flex:1}},
            e("input", {ref: addRef, className: "add-input", placeholder: "Add player name\u2026",
              value: newPlayerName,
              onChange: ev => setNewPlayerName(ev.target.value),
              onKeyDown: ev => ev.key === "Enter" && addPlayer(),
              maxLength: 14}),
            e("button", {className: "add-btn", disabled: !newPlayerName.trim(), onClick: addPlayer}, "+ Add")
          )
        : e("span", {className: "roster-full-msg"}, "ROSTER FULL \u2014 " + MAX_ROSTER + "/" + MAX_ROSTER)
    )
  )
)

);
}

const root = ReactDOM.createRoot(document.getElementById(“root”));
root.render(e(App));
</script>

</body>
</html>
